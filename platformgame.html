<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Game - Keys & Diamonds</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .game-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        canvas {
            display: block;
            background: linear-gradient(to bottom, #87ceeb, #e0f6ff);
        }
        
        .controls {
            padding: 15px 20px;
            background: #f5f5f5;
            border-top: 2px solid #ddd;
            font-size: 14px;
        }
        
        .controls p {
            margin: 8px 0;
            color: #333;
        }
        
        .key {
            background: #667eea;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            display: inline-block;
            margin: 0 4px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="1200" height="700"></canvas>
        <div class="controls">
            <p><span class="key">A</span> / <span class="key">D</span> - Bewegen | <span class="key">SPATIE</span> - Springen | <span class="key">E</span> - Shop</p>
            <p>🔑 Sleutels verzamelen om deuren te openen | 💎 Diamanten verzamelen voor de shop</p>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
